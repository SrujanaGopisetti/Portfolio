var p1 = {id:"sales-dashboard",title:"Superstore Sales Storytelling Dashboard",cat:"Data Visualization",color:"#6366f1",icon:"\u{1F4CA}"};
p1.desc = "Interactive Tableau dashboard analyzing $2.3M in sales across 4 regions and 3 segments.";

p1.fullDesc = "This project analyzes the Superstore dataset ($2.3M in sales, 9,994 orders) to build a narrative-driven Tableau dashboard. The goal was to move beyond static reporting and create an interactive story that guides stakeholders from high-level KPIs down to actionable sub-category insights.\n\nThe analysis revealed critical profitability issues: while the Consumer segment drives 50% of revenue, it contributes only 38% of profit. The Furniture category, particularly Tables and Bookcases, consistently operates at a loss due to heavy discounting \u2014 totaling $120K in losses.\n\nThe dashboard includes four interconnected views: Executive Summary, Regional Performance, Category Deep-Dive, and Customer Segmentation.";
p1.methodology = ["Data extraction and cleaning using SQL and Python (Pandas)","Exploratory analysis to identify key business questions","Designed dashboard wireframes aligned with storytelling framework","Built 4 interconnected Tableau views with parameter-driven interactivity","Validated insights with statistical significance testing on discount impact"];
p1.code = [
  "import pandas as pd",
  "import numpy as np",
  "",
  "df = pd.read_csv('data/superstore.csv', parse_dates=['Order Date','Ship Date'])",
  "df.columns = df.columns.str.strip().str.lower().str.replace(' ','_')",
  "df = df.drop_duplicates(subset=['order_id','product_id'])",
  "",
  "# KPIs",
  "total_sales = df['sales'].sum()",
  "total_profit = df['profit'].sum()",
  "margin = (total_profit / total_sales) * 100",
  "print(f'Sales: ${total_sales:,.0f} | Margin: {margin:.1f}%')",
  "",
  "# Regional breakdown",
  "regional = df.groupby('region').agg(",
  "    sales=('sales','sum'), profit=('profit','sum'),",
  "    orders=('order_id','nunique')",
  ").assign(margin=lambda x: (x['profit']/x['sales']*100).round(1))",
  "print(regional.sort_values('sales', ascending=False))",
  "",
  "# Loss-making sub-categories",
  "loss = df.groupby(['category','sub_category']).agg(",
  "    sales=('sales','sum'), profit=('profit','sum'),",
  "    avg_discount=('discount','mean')",
  ").query('profit < 0').sort_values('profit')",
  "print(loss)",
  "",
  "# Discount impact",
  "df['disc_bin'] = pd.cut(df['discount'], bins=[0,.1,.2,.3,.5,1],",
  "    labels=['0-10%','10-20%','20-30%','30-50%','50%+'])",
  "print(df.groupby('disc_bin').agg(avg_profit=('profit','mean')))"
].join("\n");
p1.sqlQueries = [
  {title:"Regional Sales Performance with Margin Ranking",sql:"SELECT region,\n  ROUND(SUM(sales),0) AS total_sales,\n  ROUND(SUM(profit),0) AS total_profit,\n  ROUND(SUM(profit)/SUM(sales)*100,1) AS margin_pct,\n  COUNT(DISTINCT order_id) AS orders,\n  RANK() OVER (ORDER BY SUM(sales) DESC) AS sales_rank\nFROM superstore\nGROUP BY region\nORDER BY total_sales DESC;",insight:"West leads with $725K in sales and 14.9% margin. Central region has lowest margin at 7.9% despite $501K in sales \u2014 signals heavy discounting."},
  {title:"Top 5 Loss-Making Sub-Categories",sql:"SELECT category, sub_category,\n  ROUND(SUM(sales),0) AS total_sales,\n  ROUND(SUM(profit),0) AS total_loss,\n  ROUND(AVG(discount)*100,1) AS avg_discount_pct,\n  COUNT(*) AS order_count\nFROM superstore\nWHERE sub_category IN (\n  SELECT sub_category FROM superstore\n  GROUP BY sub_category HAVING SUM(profit) < 0\n)\nGROUP BY category, sub_category\nORDER BY total_loss ASC LIMIT 5;",insight:"Tables lose $17.7K with 26% avg discount. Bookcases and Supplies also negative. Direct correlation between discount depth and profit erosion."},
  {title:"Monthly Sales Trend with YoY Growth",sql:"WITH monthly AS (\n  SELECT DATE_TRUNC('month', order_date) AS month,\n    SUM(sales) AS sales, SUM(profit) AS profit\n  FROM superstore GROUP BY 1\n)\nSELECT month,\n  ROUND(sales,0) AS sales,\n  ROUND(profit,0) AS profit,\n  ROUND((sales - LAG(sales,12) OVER (ORDER BY month))\n    / NULLIF(LAG(sales,12) OVER (ORDER BY month),0)*100, 1) AS yoy_growth\nFROM monthly ORDER BY month;",insight:"Q4 consistently spikes 35-40% above Q1. YoY growth averages 18.2% but decelerates in Year 4."},

// Project 2: RFM Analysis
var p2 = {id:"rfm-analysis",title:"E-Commerce Customer Segmentation & RFM",cat:"Data Analysis",color:"#8b5cf6",icon:"\u{1F3AF}"};
p2.desc = "End-to-end customer segmentation on 500K+ transactions using RFM analysis and K-Means.";
p2.tools = ["Python","Pandas","Scikit-learn","Matplotlib"];
p2.impact = ["Segmented 50K+ customers into 5 clusters","Champions (12%) drive 40% of revenue","Projected 18% churn reduction"];
p2.github = "github.com/srujanagopisetti/ecommerce-rfm-segmentation";
p2.fullDesc = "This project applies RFM (Recency, Frequency, Monetary) analysis on 500K+ transactions and 50K+ customers. Using K-Means on normalized RFM scores, customers were grouped into Champions (12%), Loyal (18%), Potential Loyalists (25%), At-Risk (22%), and Lost (23%).\n\nChampions alone drive 40% of revenue. The analysis informed targeted marketing \u2014 personalized rewards for Champions, re-engagement for At-Risk, win-back for Lost \u2014 projected to reduce churn by 18%.";
p2.methodology = ["Cleaned 3.2% missing CustomerIDs, removed returns","Engineered Recency, Frequency, Monetary features","Log-transformed skewed monetary distributions","Elbow + silhouette analysis for optimal K=5","Mapped clusters to business-meaningful labels"];
p2.code = [
  "import pandas as pd",
  "import numpy as np",
  "from sklearn.preprocessing import StandardScaler",
  "from sklearn.cluster import KMeans",
  "",
  "df = pd.read_csv('data/ecommerce.csv', parse_dates=['InvoiceDate'])",
  "df = df[df['CustomerID'].notna() & (df['Quantity'] > 0)]",
  "df['Amount'] = df['Quantity'] * df['UnitPrice']",
  "",
  "snapshot = df['InvoiceDate'].max() + pd.Timedelta(days=1)",
  "rfm = df.groupby('CustomerID').agg(",
  "    R=('InvoiceDate', lambda x: (snapshot-x.max()).days),",
  "    F=('InvoiceNo','nunique'),",
  "    M=('Amount','sum')).reset_index()",
  "",
  "rfm['M_log'] = np.log1p(rfm['M'])",
  "X = StandardScaler().fit_transform(rfm[['R','F','M_log']])",
  "rfm['Cluster'] = KMeans(n_clusters=5, random_state=42).fit_predict(X)",
  "",
  "labels = {0:'Champions',1:'Loyal',2:'Potential',3:'At-Risk',4:'Lost'}",
  "rfm['Segment'] = rfm['Cluster'].map(labels)",
  "rfm.to_csv('output/rfm_segments.csv', index=False)"
].join("\n");
p2.sqlQueries = [
  {title:"RFM Score Calculation with NTILE",sql:"WITH rfm AS (\n  SELECT customer_id,\n    DATEDIFF(CURRENT_DATE, MAX(order_date)) AS recency,\n    COUNT(DISTINCT order_id) AS frequency,\n    ROUND(SUM(amount),2) AS monetary\n  FROM orders WHERE quantity > 0\n  GROUP BY customer_id\n)\nSELECT customer_id, recency, frequency, monetary,\n  NTILE(5) OVER (ORDER BY recency DESC) AS r_score,\n  NTILE(5) OVER (ORDER BY frequency) AS f_score,\n  NTILE(5) OVER (ORDER BY monetary) AS m_score\nFROM rfm;",insight:"NTILE gives equal-sized quintiles. Top R+F+M customers (score 15) represent 8% of base but 35% of revenue."},
  {title:"Segment Revenue Contribution",sql:"WITH segments AS (\n  SELECT customer_id,\n    CASE\n      WHEN r_score>=4 AND f_score>=4 THEN 'Champions'\n      WHEN f_score>=3 AND m_score>=3 THEN 'Loyal'\n      WHEN r_score>=3 THEN 'Potential'\n      WHEN r_score>=2 THEN 'At-Risk'\n      ELSE 'Lost' END AS segment,\n    monetary\n  FROM rfm_scored\n)\nSELECT segment,\n  COUNT(*) AS customers,\n  ROUND(AVG(monetary),0) AS avg_revenue,\n  ROUND(SUM(monetary)*100.0 / (SELECT SUM(monetary) FROM segments), 1) AS rev_pct\nFROM segments GROUP BY segment\nORDER BY rev_pct DESC;",insight:"Champions: 12% of customers, 40% of revenue ($842 avg). Lost: 23% of customers, 5% of revenue ($54 avg)."},
  {title:"Monthly Cohort Retention",sql:"WITH first_purchase AS (\n  SELECT customer_id,\n    DATE_TRUNC('month', MIN(order_date)) AS cohort\n  FROM orders GROUP BY customer_id\n),\nact AS (\n  SELECT o.customer_id, f.cohort,\n    EXTRACT(MONTH FROM AGE(o.order_date, f.cohort)) AS mnum\n  FROM orders o JOIN first_purchase f USING(customer_id)\n)\nSELECT cohort,\n  COUNT(DISTINCT CASE WHEN mnum=0 THEN customer_id END) AS m0,\n  COUNT(DISTINCT CASE WHEN mnum=1 THEN customer_id END) AS m1,\n  COUNT(DISTINCT CASE WHEN mnum=3 THEN customer_id END) AS m3,\n  COUNT(DISTINCT CASE WHEN mnum=6 THEN customer_id END) AS m6\nFROM act GROUP BY cohort ORDER BY cohort;",insight:"Month-1 retention: 32%. Drops to 18% by month-3. Nov-Dec cohorts retain 2.4x better \u2014 holiday buyers become repeat customers."}
];

p5.methodology = ["Audited existing workflows for inconsistencies","Built modular Python classes per stage","Frequentist + Bayesian significance testing","Automated Tableau report generation","Trained 3 product teams"];
p5.code = [
  "import numpy as np",
  "from scipy import stats",
  "from scipy.stats import norm",
  "",
  "class ABTest:",
  "    @staticmethod",
  "    def sample_size(baseline, mde, alpha=0.05, power=0.8):",
  "        za = norm.ppf(1-alpha/2)",
  "        zb = norm.ppf(power)",
  "        p1, p2 = baseline, baseline*(1+mde)",
  "        pool = (p1+p2)/2",
  "        n = ((za*np.sqrt(2*pool*(1-pool)) +",
  "              zb*np.sqrt(p1*(1-p1)+p2*(1-p2)))**2) / (p1-p2)**2",
  "        return int(np.ceil(n))",
  "",
  "    @staticmethod",
  "    def prop_test(c_conv, c_n, t_conv, t_n):",
  "        table = np.array([[c_conv, c_n-c_conv],",
  "                          [t_conv, t_n-t_conv]])",
  "        chi2, p, _, _ = stats.chi2_contingency(table)",
  "        lift = (t_conv/t_n - c_conv/c_n) / (c_conv/c_n) * 100",
  "        sig = p < 0.05",
  "        rec = 'SHIP' if (sig and lift>0) else 'HOLD'",
  "        return {'chi2':round(chi2,4), 'p':round(p,6),",
  "                'lift':str(round(lift,1))+'%', 'sig':sig, 'rec':rec}",
  "",
  "print('Sample size:', ABTest.sample_size(0.12, 0.10))",
  "print(ABTest.prop_test(1200, 10000, 1350, 10000))"
].join("\n");

p6.code = [
  "import pandas as pd",
  "import numpy as np",
  "from sklearn.ensemble import IsolationForest",
  "from sklearn.preprocessing import StandardScaler",
  "",
  "class AnomalyDetector:",
  "    def __init__(self):",
  "        self.model = IsolationForest(contamination=0.02, n_estimators=200)",
  "        self.scaler = StandardScaler()",
  "",
  "    def features(self, df):",
  "        g = df.groupby(['warehouse_id','product_id'])",
  "        df['qty_ma'] = g['quantity'].transform(lambda x: x.rolling(7,1).mean())",
  "        df['qty_std'] = g['quantity'].transform(lambda x: x.rolling(7,1).std().fillna(0))",
  "        df['qty_z'] = (df['quantity']-df['qty_ma'])/df['qty_std'].replace(0,1)",
  "        df['cost_var'] = (df['unit_cost']-g['unit_cost'].transform(",
  "            lambda x: x.rolling(30,1).mean()))/df['unit_cost']*100",
  "        self.cols = ['qty_z','cost_var','quantity','unit_cost']",
  "        return df",
  "",
  "    def detect(self, df):",
  "        X = self.scaler.fit_transform(df[self.cols].fillna(0))",
  "        df['anomaly'] = (self.model.fit_predict(X)==-1).astype(int)",
  "        print('Found: ' + str(df['anomaly'].sum()) + ' anomalies')",
  "        return df",
  "",
  "det = AnomalyDetector()",
  "df = det.features(pd.read_csv('data/supply_chain.csv'))",

  h += '</div></section>';

  // Education
  h += '<section id="Education" class="sec"><div class="st"><h2>Education</h2><div class="br"></div></div>';
  h += '<div class="eg">';
  P.edu.forEach(function(e){
    h += '<div class="cd" style="padding:22px"><p style="font-size:12px;color:var(--accent2);font-weight:600;margin-bottom:4px">'+e.period+'</p>';
    h += '<h3 style="font-size:16px;font-weight:700;margin-bottom:5px">'+e.deg+'</h3>';
    h += '<p style="font-size:13px;color:var(--muted);margin-bottom:4px">'+e.school+'</p>';
    h += '<span class="gp">GPA: '+e.gpa+'</span></div>';
  });
  h += '</div></section>';

  // Contact
  h += '<section id="Contact" class="sec" style="padding-bottom:70px;text-align:center"><div class="st" style="text-align:left"><h2>Let\u2019s Connect</h2><div class="br"></div></div>';
  h += '<div style="max-width:480px;margin:0 auto"><div class="cd" style="padding:36px">';
  h += '<p style="font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:24px">Open to opportunities, data challenges, and collaborations.</p>';
  var ci = [["\u{1F4E7}",P.email],["\u{1F4F1}",P.phone],["\u{1F4CD}",P.location],["\u{1F517}",P.github]];
  ci.forEach(function(x){ h += '<div class="ctr"><span>'+x[0]+'</span> '+x[1]+'</div>'; });
  h += '</div></div></section>';

  return h;
}

function renderDetail(){
  var p = null;
  for(var i=0;i<projects.length;i++){ if(projects[i].id===curProj) p=projects[i]; }
  if(!p) return '';

  var tabs = ['overview','methodology','sql_analysis','code','visualizations'];
  var h = '<div style="padding-top:24px">';
  h += '<button class="db" onclick="goHome()">\u2190 Back to Portfolio</button>';
  h += '<div style="display:flex;align-items:center;gap:14px;margin-bottom:8px">';
  h += '<span style="font-size:36px">'+p.icon+'</span><div>'+mktag(p.cat,p.color);
  h += '<h1 style="font-size:28px;font-weight:800;margin-top:6px">'+p.title+'</h1></div></div>';
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">';
  p.tools.forEach(function(t){ h += mktag(t,p.color); });
  h += '</div>';
  h += '<div style="font-size:13px;color:var(--muted);margin-bottom:28px">\u{1F4C1} <a href="https://'+p.github+'" target="_blank">'+p.github+'</a></div>';

  // Tabs
  h += '<div class="tabs">';
  tabs.forEach(function(t){
    var label = t.replace('_',' ');
    h += '<button class="'+(curTab===t?'ac':'')+'" onclick="switchTab(\''+t+'\')">'+label+'</button>';
  });
  h += '</div>';

  // Content
  if(curTab === 'overview'){
    h += '<div class="cd"><h3 style="font-size:16px;font-weight:700;margin-bottom:14px">Project Overview</h3>';
    var paras = p.fullDesc.split('\n\n');
    paras.forEach(function(para){ h += '<p style="font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:14px">'+para+'</p>'; });
    h += '</div><div class="cd"><h3 style="font-size:16px;font-weight:700;margin-bottom:14px">Key Impact</h3>';
    p.impact.forEach(function(im,i){
      h += '<div style="display:flex;gap:10px;margin-bottom:10px"><span style="background:'+p.color+';color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">'+(i+1)+'</span>';
      h += '<span style="font-size:14px;color:#cbd5e1;line-height:1.6">'+im+'</span></div>';
    });
    h += '</div>';
  } else if(curTab === 'methodology'){
    h += '<div class="cd"><h3 style="font-size:16px;font-weight:700;margin-bottom:18px">Methodology & Approach</h3>';
    p.methodology.forEach(function(s,i){
      h += '<div class="si"><div class="sn" style="background:linear-gradient(135deg,'+p.color+','+p.color+'aa)">'+(i+1)+'</div>';
      h += '<p style="font-size:14px;color:#cbd5e1;line-height:1.7">'+s+'</p></div>';
    });
    h += '</div>';
  } else if(curTab === 'sql_analysis'){
    h += '<div class="cd"><h3 style="font-size:16px;font-weight:700;margin-bottom:6px">SQL Queries & Insights</h3>';
    h += '<p style="font-size:13px;color:var(--muted);margin-bottom:4px">'+p.sqlQueries.length+' analytical queries with business insights.</p></div>';
    p.sqlQueries.forEach(function(q,i){
      h += '<div class="sq"><div class="sqt"><span class="sqn">'+(i+1)+'</span>'+q.title+'</div>';
      h += '<pre>'+esc(q.sql)+'</pre>';
      h += '<div class="ins">\u{1F4A1} <strong>Insight:</strong> '+q.insight+'</div></div>';
    });
  } else if(curTab === 'code'){
    h += '<div class="cb"><div class="ch"><span>Python Source Code</span>'+mktag('Python',p.color)+'</div>';
    h += '<pre><code>'+esc(p.code)+'</code></pre></div>';
  } else if(curTab === 'visualizations'){
    var keys = Object.keys(p.charts);
    h += '<div class="cd"><h3 style="font-size:16px;font-weight:700;margin-bottom:6px">Interactive Visualizations</h3>';
    h += '<p style="font-size:13px;color:var(--muted)">Charts built from project analysis data.</p></div>';
    // Render in pairs
    for(var i=0; i<keys.length; i+=2){
      h += '<div class="cg">';
      h += '<div class="cd"><h4 style="font-size:14px;font-weight:600;margin-bottom:8px;color:var(--text)">'+p.charts[keys[i]].title+'</h4><div class="cc"><canvas id="chart_'+keys[i]+'"></canvas></div></div>';
      if(keys[i+1]){
        h += '<div class="cd"><h4 style="font-size:14px;font-weight:600;margin-bottom:8px;color:var(--text)">'+p.charts[keys[i+1]].title+'</h4><div class="cc"><canvas id="chart_'+keys[i+1]+'"></canvas></div></div>';
      }
      h += '</div>';
    }
  }

  h += '<div style="height:60px"></div></div>';
  return h;
}

function initCharts(){
  destroyCharts();
  if(view !== 'detail' || curTab !== 'visualizations') return;
  var p = null;
  for(var i=0;i<projects.length;i++){ if(projects[i].id===curProj) p=projects[i]; }
  if(!p) return;

  Chart.defaults.color = '#94a3b8';
  Chart.defaults.font.family = 'Inter';

  var keys = Object.keys(p.charts);
  keys.forEach(function(id){
    var cfg = p.charts[id];
    var el = document.getElementById('chart_'+id);
    if(!el) return;
    var ctx = el.getContext('2d');
    var chartCfg;

    if(cfg.type === 'bar'){
      chartCfg = {
        type:'bar',
        data:{labels:cfg.labels, datasets:cfg.datasets.map(function(ds){
          return {label:ds.label, data:ds.data, backgroundColor:ds.bg, borderRadius:4, barPercentage:0.7};
        })},
        options:{responsive:true, maintainAspectRatio:false,
          plugins:{legend:{labels:{boxWidth:12,padding:10}}},
          scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(255,255,255,0.06)'},beginAtZero:true}}}
      };
    } else if(cfg.type === 'line'){
      chartCfg = {
        type:'line',
        data:{labels:cfg.labels, datasets:cfg.datasets.map(function(ds){
          return {label:ds.label, data:ds.data, borderColor:ds.color, backgroundColor:ds.color+'20',
            borderWidth:2, pointRadius:3, pointBackgroundColor:ds.color,
            tension:0.3, fill:false, spanGaps:true,
            borderDash: ds.dash ? [6,4] : []};
        })},
        options:{responsive:true, maintainAspectRatio:false,
          plugins:{legend:{labels:{boxWidth:12,padding:10}}},
          scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(255,255,255,0.06)'},beginAtZero:true}}}
      };
    } else if(cfg.type === 'doughnut'){
      chartCfg = {
        type:'doughnut',
        data:{labels:cfg.labels, datasets:[{data:cfg.data, backgroundColor:cfg.colors, borderWidth:0}]},
        options:{responsive:true, maintainAspectRatio:false, cutout:'55%',
          plugins:{legend:{position:'right',labels:{boxWidth:10,padding:8,font:{size:11}}}}}
      };
    }
    if(chartCfg){
      chartInstances.push(new Chart(ctx, chartCfg));
    }
  });
}

function render(){
  destroyCharts();
  document.getElementById('app').innerHTML = (view === 'detail') ? renderDetail() : renderHome();
  renderNav();
  if(view === 'detail' && curTab === 'visualizations'){
    setTimeout(initCharts, 50);
  }
}

window.openProject = function(id){ view='detail'; curProj=id; curTab='overview'; render(); window.scrollTo(0,0); };
window.goHome = function(){ view='home'; curProj=null; render(); window.scrollTo(0,0); };
window.switchTab = function(t){ curTab=t; render(); };

render();
</script>
</body>
</html>
